services:
  mysql:
    image: mysql:8.0
    container_name: tour-tracker-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-tour_tracker_management}
      TZ: Asia/Kolkata
    command: --default-time-zone=+05:30
    expose:
      - "3306"
    volumes:
      - /data/mysql/tour-tracker:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/docker_seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - tour-tracker-network

  backend:
    build:
      context: ./backend
    container_name: tour-tracker-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      TZ: Asia/Kolkata
      PORT: 5001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-tour_tracker_management}
      JWT_SECRET: ${JWT_SECRET:-change_this_local_secret}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-yourgmail@gmail.com}
      SMTP_PASS: ${SMTP_PASS:-your_gmail_app_password}
      SMTP_FROM: ${SMTP_FROM:-Tour Report Management <yourgmail@gmail.com>}
    ports:
      - "5001:5001"
    volumes:
      - /data/uploads/tour-tracker:/app/uploads
    networks:
      - tour-tracker-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5001"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: tour-tracker-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    networks:
      - tour-tracker-network

networks:
  tour-tracker-network:
