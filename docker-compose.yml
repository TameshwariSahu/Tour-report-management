services:
  mysql:
    image: mysql:8.0
    container_name: tour-report-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-tour_report_management}
    ports:
      - "3307:3306"
    volumes:
      - tour_report_mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/docker_seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: tour-report-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5001
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-tour_report_management}
      JWT_SECRET: ${JWT_SECRET:-change_this_local_secret}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5174,http://127.0.0.1:5174}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-yourgmail@gmail.com}
      SMTP_PASS: ${SMTP_PASS:-your_gmail_app_password}
      SMTP_FROM: ${SMTP_FROM:-Tour Report Management <yourgmail@gmail.com>}
    ports:
      - "5001:5001"
    volumes:
      - tour_report_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    container_name: tour-report-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5001
    ports:
      - "5174:5174"

volumes:
  tour_report_mysql_data:
  tour_report_uploads:
